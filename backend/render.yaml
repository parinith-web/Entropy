services:
  - type: web
    name: medpulse-api
    runtime: python
    pythonVersion: "3.11.9"
    rootDir: backend
    buildCommand: pip install --upgrade pip setuptools wheel && pip install -r requirements.txt
    startCommand: cd src && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        sync: false # User will provide this from Neon
      - key: ALLOWED_ORIGINS
        sync: false # User will provide their Vercel URL
      - key: PIPELINE_SECRET
        sync: false # User will generate a secret for cron trigger
    healthCheckPath: /health